<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog — XOVER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f8f6f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 1rem;
        }
        .container {
            background: #fff;
            padding: 3rem 4rem;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            color: #0b1a2e;
            margin-bottom: 0.5rem;
        }
        .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            color: #4a5a6e;
            margin-bottom: 1.5rem;
        }
        .sub {
            font-size: 0.9rem;
            color: #aaa;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #c44536;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
        }
        .back-link:hover {
            border-bottom-color: #c44536;
        }
    </style>
</head>
<body>
<div class="container">
    <span class="emoji">🛠️</span>
    <h1>Catalog</h1>
    <p>We are currently updating the catalog.<br />Please check back later.</p>
    <div class="sub">XOVER — International Center for Graphic Literature</div>
    <a href="/" class="back-link">← Back to main page</a>
</div>
</body>
</html>
