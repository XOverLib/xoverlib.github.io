<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Каталог — XOVER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f8f6f2;
            color: #1e1e1e;
            line-height: 1.6;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0b1a2e;
            margin-bottom: 0.5rem;
        }
        .subhead {
            color: #c44536;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #c44536;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }
        .back-link:hover {
            border-bottom-color: #c44536;
        }

        /* Поиск */
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 2px solid #e0dcd4;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 200px;
        }
        .search-box input:focus {
            outline: none;
            border-color: #c44536;
        }
        .search-box select {
            padding: 0.6rem 1rem;
            border: 2px solid #e0dcd4;
            border-radius: 8px;
            font-size: 1rem;
            background: #fff;
            cursor: pointer;
        }
        .search-box button {
            padding: 0.6rem 1.5rem;
            background: #c44536;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #a8352a;
        }

        /* Таблица */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #0b1a2e;
            color: #fff;
            padding: 0.6rem 0.8rem;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid #e0dcd4;
            vertical-align: top;
        }
        tr:hover {
            background: #f8f6f2;
        }
        .col-title { min-width: 180px; font-weight: 500; }
        .col-series { min-width: 120px; }
        .col-authors { min-width: 120px; }
        .col-year { min-width: 70px; }
        .col-language { min-width: 70px; }
        .col-count { min-width: 50px; text-align: center; }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 0.4rem 1rem;
            border: 2px solid #c44536;
            background: #fff;
            color: #c44536;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .pagination button:hover,
        .pagination button.active {
            background: #c44536;
            color: #fff;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Счётчик */
        .counter {
            margin-top: 1rem;
            color: #4a5a6e;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            h1 { font-size: 1.8rem; }
            .search-box { flex-direction: column; }
            .search-box input,
            .search-box select,
            .search-box button { width: 100%; }
            th, td { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <a href="/" class="back-link">← На главную</a>
    <h1>Каталог коллекции</h1>
    <div class="subhead">Все издания, которые есть в фонде XOVER</div>

    <!-- Поиск и фильтры -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск по названию, автору, серии..." oninput="applyFilters()">
        <select id="languageFilter" onchange="applyFilters()">
            <option value="">Все языки</option>
        </select>
        <select id="typeFilter" onchange="applyFilters()">
            <option value="">Все типы</option>
        </select>
        <button onclick="applyFilters()">Найти</button>
        <button onclick="resetFilters()" style="background:#e0dcd4;color:#1e1e1e;">Сбросить</button>
    </div>

    <!-- Таблица -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-title">Название</th>
                    <th class="col-series">Серия</th>
                    <th class="col-authors">Авторы</th>
                    <th class="col-year">Год</th>
                    <th class="col-language">Язык</th>
                    <th class="col-count">Кол-во</th>
                </tr>
            </thead>
            <tbody id="catalogBody"></tbody>
        </table>
    </div>

    <!-- Пагинация -->
    <div class="pagination" id="pagination"></div>
    <div class="counter" id="counter"></div>

</div>

<script>
    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    const perPage = 25;

    // Загружаем данные
    fetch('catalog.json')
        .then(res => {
            if (!res.ok) throw new Error('Не удалось загрузить каталог');
            return res.json();
        })
        .then(data => {
            allData = data;
            populateFilters(data);
            applyFilters();
        })
        .catch(err => {
            document.getElementById('catalogBody').innerHTML =
                `<tr><td colspan="6" style="text-align:center;padding:2rem;color:#c44536;">
                    ❌ Ошибка загрузки каталога: ${err.message}
                </td></tr>`;
        });

    function populateFilters(data) {
        const languages = new Set();
        const types = new Set();
        data.forEach(item => {
            if (item['Язык']) languages.add(item['Язык']);
            if (item['Тип литературы']) types.add(item['Тип литературы']);
        });

        const langSelect = document.getElementById('languageFilter');
        languages.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l;
            opt.textContent = l;
            langSelect.appendChild(opt);
        });

        const typeSelect = document.getElementById('typeFilter');
        types.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            typeSelect.appendChild(opt);
        });
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const lang = document.getElementById('languageFilter').value;
        const type = document.getElementById('typeFilter').value;

        filteredData = allData.filter(item => {
            const title = (item['Название'] || '').toLowerCase();
            const authors = (item['Авторы'] || '').toLowerCase();
            const series = (item['Серия'] || '').toLowerCase();
            const matchSearch = !search || title.includes(search) || authors.includes(search) || series.includes(search);
            const matchLang = !lang || item['Язык'] === lang;
            const matchType = !type || item['Тип литературы'] === type;
            return matchSearch && matchLang && matchType;
        });

        currentPage = 1;
        renderTable();
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('languageFilter').value = '';
        document.getElementById('typeFilter').value = '';
        applyFilters();
    }

    function renderTable() {
        const start = (currentPage - 1) * perPage;
        const pageData = filteredData.slice(start, start + perPage);
        const tbody = document.getElementById('catalogBody');

        if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:#4a5a6e;">Ничего не найдено</td></tr>`;
        } else {
            tbody.innerHTML = pageData.map(item => `
                <tr>
                    <td class="col-title">${item['Название'] || ''}</td>
                    <td class="col-series">${item['Серия'] || ''}</td>
                    <td class="col-authors">${item['Авторы'] || ''}</td>
                    <td class="col-year">${item['Год издания'] || ''}</td>
                    <td class="col-language">${item['Язык'] || ''}</td>
                    <td class="col-count">${item['Количество'] || '1'}</td>
                </tr>
            `).join('');
        }

        renderPagination();
        document.getElementById('counter').textContent =
            `Показано ${pageData.length} из ${filteredData.length} записей`;
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredData.length / perPage);
        const pagination = document.getElementById('pagination');

        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;

        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            } else if (i === currentPage - 3 || i === currentPage + 3) {
                html += `<button disabled>…</button>`;
            }
        }

        html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;
        pagination.innerHTML = html;
    }

    function goToPage(page) {
        const totalPages = Math.ceil(filteredData.length / perPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTable();
    }
</script>

</body>
</html>
